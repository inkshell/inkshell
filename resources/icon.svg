<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!--
    The app icon is the sidebar brand badge, verbatim: the iris→cyan spectrum
    tile with the ◈ mark in ink (see .brand-badge in theme.css).
  -->
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8f8bff" />
      <stop offset="0.46" stop-color="#6f9dff" />
      <stop offset="1" stop-color="#4fd8e2" />
    </linearGradient>
    <radialGradient id="halo" cx="0.28" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="depth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0.55" stop-color="#0b0d13" stop-opacity="0" />
      <stop offset="1" stop-color="#0b0d13" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Spectrum tile with soft top-left light and bottom-right depth -->
  <rect width="512" height="512" rx="112" fill="url(#spectrum)" />
  <rect width="512" height="512" rx="112" fill="url(#halo)" />
  <rect width="512" height="512" rx="112" fill="url(#depth)" />
  <rect x="3" y="3" width="506" height="506" rx="109" fill="none" stroke="url(#shine)" stroke-width="6" />

  <!-- ◈ in ink -->
  <g fill="#0b0d13">
    <path fill-rule="evenodd" d="M256 96 L416 256 L256 416 L96 256 Z M256 152 L152 256 L256 360 L360 256 Z" />
    <path d="M256 194 L318 256 L256 318 L194 256 Z" />
  </g>
</svg>
