appId: com.inkshell.app
productName: InkShell
copyright: Copyright © 2026 InkShell contributors

directories:
  buildResources: build
  output: release/${version}

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.eslintignore,eslint.config.js,.prettierrc,.prettierignore,.editorconfig}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json,yarn.lock}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # Repo housekeeping that has no business inside the app bundle. `release` is
  # the important one: electron-builder auto-excludes only the current output
  # dir (release/<version>), so on a machine with earlier builds lying around
  # the previous versions were being packed into the new app — a local-only
  # problem (CI checkouts are clean), but it tripled the bundle.
  - '!{release,docs,.github}'
  - '!{install.sh,Makefile,CHANGELOG.md,CONTRIBUTING.md,CODE_OF_CONDUCT.md,SECURITY.md,NOTICE}'

# node-pty is a native module — keep it unpacked so its prebuilt binary loads.
asarUnpack:
  - '**/node_modules/node-pty/**'

# zip is the only macOS target while builds are unsigned: install.sh consumes
# it, and a .dmg would only offer a drag-install path that ends at Gatekeeper's
# "InkShell is damaged" dialog. Bring the dmg back once builds are signed and
# notarized.
#
# arch: universal builds one lipo-merged binary for arm64 + x64 on a single
# arm64 runner, rather than a per-arch zip built on a dedicated arm64 and
# Intel runner. GitHub retired its free Intel macOS hosted runner (macos-13)
# without a free replacement, so a second runner is no longer an option.
mac:
  category: public.app-category.developer-tools
  target:
    - target: zip
      arch: universal
  artifactName: ${productName}-${version}-${arch}-mac.${ext}
  # node-pty bundles every platform's prebuilt binary inside the one npm
  # package, so the x64 pass and the arm64 pass each end up with byte-identical
  # copies of the *other* arch's prebuild too (only the darwin-${arch}
  # subfolder name picks the right one at runtime). @electron/universal's merge
  # step otherwise treats an identical Mach-O file across both passes as a bug.
  x64ArchFiles: '{pty.node,spawn-helper}'
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}

linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: InkShell contributors

npmRebuild: true

# Publish the Release outright — the default (`draft`) leaves the assets in a
# draft that has to be released by hand in the GitHub UI. `publishAutoUpdate`
# is off because the app has no auto-updater (and unsigned macOS builds
# couldn't apply updates anyway), so electron-updater's metadata
# (latest-mac.yml) stays out of the Release.
publish:
  provider: github
  releaseType: release
  publishAutoUpdate: false
