appId: com.inkshell.app
productName: InkShell
copyright: Copyright © 2026 InkShell contributors

directories:
  buildResources: build
  output: release/${version}

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.eslintignore,eslint.config.js,.prettierrc,.prettierignore,.editorconfig}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json,yarn.lock}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

# node-pty is a native module — keep it unpacked so its prebuilt binary loads.
asarUnpack:
  - '**/node_modules/node-pty/**'

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}

linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: InkShell contributors

npmRebuild: true

# Publish the Release outright. The default (`draft`) leaves the assets in a
# draft that has to be released by hand in the GitHub UI.
publish:
  provider: github
  releaseType: release
