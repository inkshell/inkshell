appId: com.vibebox.app
productName: VibeBox
copyright: Copyright © 2026 VibeBox contributors

directories:
  buildResources: build
  output: release/${version}

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.eslintignore,eslint.config.js,.prettierrc,.prettierignore,.editorconfig}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json,yarn.lock}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

# node-pty is a native module — keep it unpacked so its prebuilt binary loads.
asarUnpack:
  - '**/node_modules/node-pty/**'

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}

linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: VibeBox contributors

npmRebuild: true
